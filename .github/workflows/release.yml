name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: cysense-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: cysense-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            name: cysense-darwin-amd64
            sign: true
          - target: aarch64-apple-darwin
            os: macos-14
            name: cysense-darwin-arm64
            sign: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: cysense-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev
      - name: Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath npcap-sdk
          echo "LIB=${{ github.workspace }}\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Sign macOS
        if: matrix.sign
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_BASE64" ]; then
            CERT_PATH=$RUNNER_TEMP/cert.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
            echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime target/${{ matrix.target }}/release/cysense
          fi
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cysense dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/cysense.exe dist/${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Checksums
        run: cd artifacts && for dir in */; do (cd "$dir" && sha256sum * >> ../checksums.txt); done
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cysense-linux-amd64/cysense-linux-amd64
            artifacts/cysense-linux-arm64/cysense-linux-arm64
            artifacts/cysense-darwin-amd64/cysense-darwin-amd64
            artifacts/cysense-darwin-arm64/cysense-darwin-arm64
            artifacts/cysense-windows-amd64.exe/cysense-windows-amd64.exe
            artifacts/checksums.txt
